# =============================================================================
# FASTAPI DEPLOYMENT - Web API with Autoscaling
# =============================================================================
# This is your main REST API that accepts HTTP requests.
# We'll configure it to autoscale based on CPU/Memory usage!
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: async-tasks
  labels:
    app: fastapi
    component: webapi
spec:
  # Start with 2 replicas (pods)
  # HPA (HorizontalPodAutoscaler) will adjust this number automatically!
  replicas: 2

  selector:
    matchLabels:
      app: fastapi
      component: webapi

  # Update strategy - how to roll out new versions
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Can have 1 extra pod during update
      maxUnavailable: 0  # Keep all pods running (zero downtime!)

  template:
    metadata:
      labels:
        app: fastapi
        component: webapi
    spec:
      containers:
      - name: fastapi
        image: chemsa/fastapi-celery:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 80
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        env:
        - name: REDISSERVER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_SERVER
        - name: C_FORCE_ROOT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: C_FORCE_ROOT

        # CRITICAL: Resources must be defined for autoscaling!
        # HPA uses these values to calculate scaling metrics
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health/celery
            port: 80
          initialDelaySeconds: 60   # give celery workers time to be ready
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /health/celery
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5

        # Volume mounts for shared files
        volumeMounts:
        - name: shared-data
          mountPath: /app/SERVER

      volumes:
      - name: shared-data
        emptyDir: {}

---
# =============================================================================
# FASTAPI SERVICE - Expose FastAPI to the world
# =============================================================================
# This creates a load balancer that distributes traffic across FastAPI pods
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: async-tasks
  labels:
    app: fastapi
    component: webapi
spec:
  # NodePort = access via EC2_PUBLIC_IP:30080 (no AWS ELB needed for testing)
  type: NodePort

  selector:
    app: fastapi
    component: webapi

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080    # Access at http://<EC2_PUBLIC_IP>:30080
    protocol: TCP
    name: http

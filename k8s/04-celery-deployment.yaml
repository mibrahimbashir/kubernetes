apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: async-tasks
  labels:
    app: celery-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: celery-worker
        component: worker
    spec:
      containers:
      - name: celery-worker
        image: mibrahimbashir/celery-worker:v1
        imagePullPolicy: Always
        env:
        - name: REDISSERVER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_SERVER
        - name: C_FORCE_ROOT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: C_FORCE_ROOT
        - name: LOG_PATH
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_PATH
        - name: CELERYD_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CELERYD_LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        # Liveness: is the worker process alive and responsive?
        # grep -qi makes the match case-insensitive ("ok" or "OK" both pass).
        # Without -i, "ok" in the actual Celery output would fail the probe.
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "celery -A tasks inspect ping -d celery@$HOSTNAME | grep -qi ok"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        # Readiness: can this worker receive tasks?
        # inspect ping is reliable here too — no tasks needed to be active.
        # inspect active would return empty (not an error) when worker is idle,
        # making it useless as a readiness signal.
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "celery -A tasks inspect ping -d celery@$HOSTNAME | grep -qi ok"
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3

        volumeMounts:
        - name: shared-data
          mountPath: /celery_tasks/SERVER
        - name: logs
          mountPath: /var/log/celery

      volumes:
      - name: shared-data
        persistentVolumeClaim:
          claimName: shared-data-pvc  # Same PVC as FastAPI — this is what makes sharing work
      - name: logs
        emptyDir: {}  # Logs are pod-local, emptyDir is fine here

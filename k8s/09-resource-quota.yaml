apiVersion: v1
kind: ResourceQuota
metadata:
  name: async-tasks-quota
  namespace: async-tasks
spec:
  hard:
    pods: "30"
    # Max realistic pod count on a single node:
    # 10 FastAPI + 10 Celery + 1 Redis + 1 Flower + system headroom = ~25

    requests.cpu: "4"
    limits.cpu: "8"
    # Sized for a typical 4-core EC2 instance.
    # k3s system pods consume ~400m, leaving ~3.6 cores for the app.

    requests.memory: "8Gi"
    limits.memory: "16Gi"
    # Sized for an 8-16Gi EC2 instance.
    # Adjust both values to match your actual instance memory.

    requests.storage: "20Gi"
    persistentvolumeclaims: "5"

    services.loadbalancers: "3"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: async-tasks-limits
  namespace: async-tasks
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"      # No single container can claim more than 2 cores
      memory: "2Gi" # No single container can claim more than 2Gi
    min:
      cpu: "50m"
      memory: "64Mi"
  - type: Pod
    max:
      cpu: "2"
      memory: "2Gi"
  - type: PersistentVolumeClaim
    max:
      storage: "15Gi"
    min:
      storage: "1Gi"

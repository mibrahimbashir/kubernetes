# =============================================================================
# HORIZONTAL POD AUTOSCALER (HPA) - Celery Worker Autoscaling
# =============================================================================
# Workers process background tasks (image processing, long computations)
# They need different scaling thresholds than the API!
#
# WHY DIFFERENT THRESHOLDS?
# - Workers do CPU/memory intensive work (image processing with OpenCV)
# - We want to scale MORE AGGRESSIVELY to handle task backlog
# - Better to have idle workers than a huge task queue!
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: async-tasks
  labels:
    app: celery-worker
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker

  # Scaling boundaries
  minReplicas: 2    # Always have 2 workers ready
  maxReplicas: 20   # Can scale up to 20 workers! (higher than API)

  # Metrics for scaling
  metrics:

  # ===== CPU-BASED SCALING (Lower threshold!) =====
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60  # Scale at 60% (more aggressive than API)

    # Why 60% instead of 70%?
    # - Workers doing image processing can spike to 100% quickly
    # - We want to scale BEFORE they get overloaded
    # - Better to have spare capacity for task bursts

  # ===== MEMORY-BASED SCALING =====
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75  # Scale at 75% memory usage

    # Workers process images with OpenCV (memory-intensive!)
    # - Each worker requests 512Mi
    # - OpenCV can use a lot of memory for large images
    # - Scale before hitting the 2Gi limit

  # ===== SCALING BEHAVIOR =====
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30  # Scale up faster than API!
      policies:
      - type: Percent
        value: 100       # Can DOUBLE the workers quickly
        periodSeconds: 30
      - type: Pods
        value: 4         # Or add 4 workers at once
        periodSeconds: 30
      selectPolicy: Max

      # Why aggressive scale-up?
      # - Task queue can grow quickly (users uploading many files)
      # - Better to over-provision workers than have users wait
      # - Cloud costs are worth it for good user experience!

    scaleDown:
      stabilizationWindowSeconds: 600  # Wait 10 minutes before scaling down
      policies:
      - type: Percent
        value: 25        # Remove only 25% of workers at a time
        periodSeconds: 120
      - type: Pods
        value: 2         # Or remove max 2 workers
        periodSeconds: 120
      selectPolicy: Min

      # Why slow scale-down?
      # - Tasks might be in-progress (don't kill workers prematurely)
      # - Traffic patterns can be bursty
      # - Keep workers around longer "just in case"

# =============================================================================
# ADVANCED: Custom Metrics for Queue-Based Scaling (Optional)
# =============================================================================
# For production, you might want to scale based on Redis queue length!
#
# Example: Scale when there are more than 10 tasks per worker
#
# This requires:
# 1. Prometheus to scrape Celery metrics
# 2. Prometheus Adapter to expose custom metrics to Kubernetes
# 3. Custom metric: celery_queue_length / num_workers
#
# Configuration would look like:
# ```yaml
# metrics:
# - type: External
#   external:
#     metric:
#       name: celery_queue_length_per_worker
#     target:
#       type: AverageValue
#       averageValue: "10"  # Scale if queue has >10 tasks per worker
# ```
#
# This is ADVANCED but gives you much better scaling behavior!
# CPU/Memory is good, but queue length is the TRUE indicator of worker load.
# =============================================================================

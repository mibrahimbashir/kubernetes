apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: async-tasks
  labels:
    app: celery-worker
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 2
  maxReplicas: 10  # Capped at 10 for a single node.
                   # 10 workers * 256Mi = 2.5Gi requests, which is realistic.
                   # Raise this only if your instance has headroom confirmed via
                   # kubectl top nodes.
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
        # Each pod requests 150m CPU.
        # Scale up when average usage exceeds 90m per pod.
        # Lower threshold than FastAPI because OpenCV tasks spike fast.

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
        # Each pod requests 256Mi memory.
        # Scale up when average usage exceeds ~192Mi per pod.

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Percent
        value: 25
        periodSeconds: 120
      - type: Pods
        value: 2
        periodSeconds: 120
      selectPolicy: Min

# =============================================================================
# FLOWER DEPLOYMENT - Celery monitoring dashboard
# =============================================================================
# Flower provides a web UI to monitor your Celery workers
# We don't need autoscaling for this (it's just a monitoring tool)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  namespace: async-tasks
  labels:
    app: flower
    component: monitoring
spec:
  replicas: 1  # One instance is enough for monitoring

  selector:
    matchLabels:
      app: flower
      component: monitoring

  template:
    metadata:
      labels:
        app: flower
        component: monitoring
    spec:
      containers:
      - name: flower
        image: mher/flower:2.0.1

        command: ["celery"]
        args:
          - flower
          - --port=5555
          - --logging=info

        ports:
        - containerPort: 5555
          name: http
          protocol: TCP

        env:
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/0"
        - name: FLOWER_BROKER_API
          value: "redis://redis-service:6379/0"
        - name: FLOWER_BASIC_AUTH
          value: "admin:test@123"

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 5555
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /
            port: 5555
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 5

---
# =============================================================================
# FLOWER SERVICE - Expose Flower dashboard
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: flower-service
  namespace: async-tasks
  labels:
    app: flower
    component: monitoring
spec:
  # NodePort = access via EC2_PUBLIC_IP:30555 (no AWS ELB needed for testing)
  type: NodePort

  selector:
    app: flower
    component: monitoring

  ports:
  - port: 5555
    targetPort: 5555
    nodePort: 30555    # Access at http://<EC2_PUBLIC_IP>:30555
    protocol: TCP
    name: http
